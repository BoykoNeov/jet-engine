[pytest]
# Parallel by default. The suite's per-test durations are extremely uneven — a few multi-minute
# mixing-PDF / transient gates among hundreds of sub-second ones — so scheduling dominates the
# full-run wall clock. conftest.py sorts collection LONGEST-FIRST (learned durations); paired with
# `--dist load --maxschedchunk=1` (dynamic, one item at a time) that is textbook LPT scheduling:
# each multi-minute pole gets a worker to itself at t=0 and the short tests fill in behind it,
# so the makespan approaches the single longest test instead of a stacked tail.
# The fast/slow selection policy also lives in conftest.py (`pytest` = fast subset, `--runslow` = all).
addopts = -n auto --dist load --maxschedchunk=1
testpaths = tests
markers =
    slow: an inherently-expensive gate (deselected unless --runslow)
